<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Product cards</title>
    <link
      rel="stylesheet"
      href="./styles/index.scss"
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div
      class="card"
      data-qa="card"
    >
      <div class="card__content">
        <div class="card__back"></div>
        <div class="card__text">
          <p class="card__info">
            APPLE A1419 iMac 27" Retina 5K Monoblock (MNED2UA/A)
          </p>
          <p class="card__product">Product code: 195434</p>
        </div>

        <div class="star">
          <div class="stars">
            <div class="stars__star"></div>
            <div class="stars__star"></div>
            <div class="stars__star"></div>
            <div class="stars__star"></div>
            <div class="stars__star"></div>
          </div>
          <p class="star__reviews">Reviews: 5</p>
        </div>

        <div class="price">
          <p class="price__text">Price:</p>
          <p class="price__text">$2,199</p>
        </div>
      </div>

      <a
        href="#"
        class="card__link"
        data-qa="hover"
      >
        <div class="buy">
          <p class="buy__text">BUY</p>
        </div>
      </a>
    </div>
  </body>
</html>
